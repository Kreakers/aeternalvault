name: aeternavault
description: "Personal CRM"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.1
  path: ^1.9.0
  provider: ^6.1.2
  local_auth: ^2.3.0
  encrypt: ^5.0.3
  intl: ^0.20.2
  image_picker: ^1.1.2
  crypto: ^3.0.3
  share_plus: ^10.1.0
  file_picker: ^8.1.2
  path_provider: ^2.1.4
  fl_chart: ^0.69.0
  open_filex: ^4.5.0
  flutter_secure_storage: ^9.2.2
  url_launcher: ^6.3.1
  intl_phone_field: ^3.2.0
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  flutter_timezone: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#1B3060"
  adaptive_icon_foreground: "assets/icon/icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#1B3060"
  image: "assets/icon/icon.png"
  color_dark: "#1B3060"
  image_dark: "assets/icon/icon.png"
  android: true
  ios: true
  fullscreen: true

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icon/
    - assets/images/
